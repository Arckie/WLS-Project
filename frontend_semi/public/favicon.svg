<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="풀스택 강의실 파비콘">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f80ff"/>
      <stop offset="100%" stop-color="#0f5fe8"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d47b5"/>
      <stop offset="100%" stop-color="#123b92"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="8" y="8" width="240" height="240" rx="44" fill="url(#bg)"/>

  <!-- monitor frame -->
  <rect x="46" y="52" width="164" height="96" rx="18" fill="#ffffff"/>
  <rect x="54" y="60" width="148" height="80" rx="12" fill="url(#screen)"/>

  <!-- code symbol -->
  <path d="M96 84L74 100L96 116" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M160 84L182 100L160 116" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M136 78L120 122" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- monitor stand -->
  <rect x="118" y="148" width="20" height="18" rx="4" fill="#ffffff"/>
  <path d="M102 168H154" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- audience / classroom -->
  <g fill="#dce9ff">
    <!-- center -->
    <circle cx="128" cy="186" r="18"/>
    <path d="M96 222c0-18 14-30 32-30s32 12 32 30v2H96z"/>

    <!-- left -->
    <circle cx="74" cy="192" r="14"/>
    <path d="M48 222c0-14 12-24 26-24s26 10 26 24v2H48z"/>

    <!-- right -->
    <circle cx="182" cy="192" r="14"/>
    <path d="M156 222c0-14 12-24 26-24s26 10 26 24v2h-52z"/>
  </g>
</svg>